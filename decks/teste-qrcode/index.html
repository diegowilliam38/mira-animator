<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste QR Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000000;
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .primary-color {
            color: #FF904D;
        }

        /* Cartão claro do QR: contraste alto e zona de silêncio embutida no padding */
        .qr-card {
            position: relative;
            background: #ffffff;
            border-radius: 24px;
            padding: 28px;
            width: min(62vh, 80vw);
            animation: qr-glow 3s ease-in-out infinite;
        }

        .qr-card svg {
            display: block;
            width: 100%;
            height: auto;
        }

        /* Loop interno (Regra Zero): pulso de brilho na moldura, nunca sobre os módulos */
        @keyframes qr-glow {
            0%, 100% {
                box-shadow: 0 0 25px rgba(255, 144, 77, 0.25), 0 0 60px rgba(255, 144, 77, 0.10);
            }
            50% {
                box-shadow: 0 0 45px rgba(255, 144, 77, 0.55), 0 0 110px rgba(255, 144, 77, 0.25);
            }
        }

        /* Cantos animados orbitando o cartão */
        .qr-corner {
            position: absolute;
            width: 34px;
            height: 34px;
            border: 3px solid #FF904D;
            animation: qr-breathe 3s ease-in-out infinite;
        }

        .qr-corner.tl { top: -12px; left: -12px; border-right: none; border-bottom: none; border-radius: 12px 0 0 0; }
        .qr-corner.tr { top: -12px; right: -12px; border-left: none; border-bottom: none; border-radius: 0 12px 0 0; }
        .qr-corner.bl { bottom: -12px; left: -12px; border-right: none; border-top: none; border-radius: 0 0 0 12px; }
        .qr-corner.br { bottom: -12px; right: -12px; border-left: none; border-top: none; border-radius: 0 0 12px 0; }

        @keyframes qr-breathe {
            0%, 100% { transform: translate(0, 0); opacity: 0.6; }
            50% { transform: translate(var(--dx), var(--dy)); opacity: 1; }
        }

        .qr-corner.tl { --dx: -6px; --dy: -6px; }
        .qr-corner.tr { --dx: 6px; --dy: -6px; }
        .qr-corner.bl { --dx: -6px; --dy: 6px; }
        .qr-corner.br { --dx: 6px; --dy: 6px; }
    </style>
</head>

<body class="font-sans">

    <!-- Card 1: QR code central (link: https://sandeco.com.br) -->
    <section class="min-h-screen flex flex-col items-center justify-center px-6 pt-3 pb-6">
        <div class="w-full max-w-6xl flex flex-col items-center" data-aos="fade-up" data-aos-delay="100">
            <!-- Título do slide: SEM ícone, no máximo 6 palavras -->
            <div class="text-center mb-6">
                <h2 class="text-4xl md:text-5xl font-bold mb-2">
                    Acesse <span class="primary-color italic">sandeco.com.br</span>
                </h2>
            </div>

            <div class="qr-card">
                <div class="qr-corner tl"></div>
                <div class="qr-corner tr"></div>
                <div class="qr-corner bl"></div>
                <div class="qr-corner br"></div>
                <!-- QR gerado localmente (pacote npm qrcode, errorCorrectionLevel M) para https://sandeco.com.br -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" shape-rendering="crispEdges"><path fill="#ffffff" d="M0 0h25v25H0z"/><path stroke="#0a0a0a" d="M0 0.5h7m5 0h2m2 0h1m1 0h7M0 1.5h1m5 0h1m3 0h1m1 0h5m1 0h1m5 0h1M0 2.5h1m1 0h3m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m3 0h1m1 0h3m1 0h1M0 3.5h1m1 0h3m1 0h1m1 0h2m3 0h3m2 0h1m1 0h3m1 0h1M0 4.5h1m1 0h3m1 0h1m1 0h1m2 0h3m2 0h1m1 0h1m1 0h3m1 0h1M0 5.5h1m5 0h1m1 0h1m1 0h2m2 0h2m2 0h1m5 0h1M0 6.5h7m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h7M8 7.5h2m2 0h1m1 0h1m1 0h1M0 8.5h1m1 0h5m2 0h5m4 0h5M1 9.5h3m4 0h2m2 0h2m5 0h1m3 0h1M0 10.5h1m1 0h6m1 0h8m1 0h4m1 0h2M0 11.5h1m1 0h2m1 0h1m1 0h2m1 0h3m3 0h3m5 0h1M1 12.5h6m1 0h2m3 0h2m2 0h4m1 0h3M0 13.5h2m1 0h2m3 0h3m1 0h1m3 0h1m2 0h1m1 0h1m1 0h1M0 14.5h1m4 0h6m2 0h1m1 0h3m1 0h3m1 0h2M0 15.5h1m2 0h1m1 0h1m1 0h1m1 0h2m1 0h1m6 0h2m3 0h1M0 16.5h1m1 0h2m1 0h3m1 0h1m2 0h9m1 0h1M8 17.5h1m1 0h1m3 0h3m3 0h2M0 18.5h7m2 0h1m1 0h3m2 0h1m1 0h1m1 0h1m1 0h3M0 19.5h1m5 0h1m1 0h1m2 0h1m4 0h1m3 0h2M0 20.5h1m1 0h3m1 0h1m1 0h4m3 0h6m1 0h3M0 21.5h1m1 0h3m1 0h1m1 0h1m3 0h2m3 0h2m1 0h5M0 22.5h1m1 0h3m1 0h1m1 0h3m2 0h2m6 0h2m1 0h1M0 23.5h1m5 0h1m2 0h2m1 0h2m1 0h7m2 0h1M0 24.5h7m1 0h2m2 0h1m1 0h1m3 0h7"/></svg>
            </div>
        </div>
    </section>

    <script>
        AOS.init({ duration: 800, once: true, offset: 100 });
    </script>
</body>

</html>
