<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste 3D: Drone FPV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        body {
            background: #000000;
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(255, 144, 77, 0.15);
        }

        .primary-color {
            color: #FF904D;
        }

        #model-canvas-wrap {
            position: relative;
            width: 100%;
            height: 76vh;
            min-height: 480px;
            cursor: grab;
        }

        #model-canvas-wrap:active {
            cursor: grabbing;
        }
    </style>
</head>

<body class="font-sans">

    <!-- Card 1: Drone FPV em 3D -->
    <section class="min-h-screen flex flex-col items-center justify-center px-6 pt-3 pb-6">
        <div class="w-full max-w-6xl" data-aos="fade-up" data-aos-delay="100">
            <!-- Título do slide: SEM ícone, no máximo 6 palavras -->
            <div class="text-center mb-2">
                <h2 class="text-4xl md:text-5xl font-bold mb-2">
                    Drone <span class="primary-color italic">FPV</span>
                </h2>
                <p class="text-white/60 italic text-lg md:text-xl">Modelo .glb fornecido pelo usuário.</p>
            </div>

            <div class="glass-card rounded-2xl p-3 md:p-4">
                <div id="model-canvas-wrap"></div>
            </div>
        </div>
    </section>

    <script>
        AOS.init({ duration: 800, once: true, offset: 100 });
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const wrap = document.getElementById('model-canvas-wrap');

        // === Cena, câmera, renderer ===
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 100);
        camera.position.set(0, 0.4, 3.4);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(wrap.clientWidth, wrap.clientHeight);
        wrap.appendChild(renderer.domElement);

        // === Luzes ===
        scene.add(new THREE.AmbientLight(0xffffff, 0.55));
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.6);
        keyLight.position.set(2.5, 3, 4);
        scene.add(keyLight);
        const rimLight = new THREE.DirectionalLight(0xff7733, 2.2);
        rimLight.position.set(-4, -1.5, -3);
        scene.add(rimLight);

        // === Carrega o modelo .glb fornecido pelo usuário ===
        const model3d = new THREE.Group();
        model3d.rotation.x = 0.12;
        scene.add(model3d);

        const loadingMsg = document.createElement('p');
        loadingMsg.textContent = 'Carregando modelo 3D...';
        loadingMsg.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);';
        wrap.appendChild(loadingMsg);

        new GLTFLoader().load(
            'assets/drone.glb',
            (gltf) => {
                const model = gltf.scene;
                // Centraliza e escala para caber no enquadramento da câmera
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                model.position.sub(center);
                model3d.add(model);
                model3d.scale.setScalar(2.7 / Math.max(size.x, size.y, size.z));
                loadingMsg.remove();
            },
            undefined,
            () => {
                loadingMsg.textContent = 'Falha ao carregar assets/drone.glb. Abra a página por um servidor HTTP local (não file://).';
            }
        );

        // === Interação: arrastar gira, scroll dá zoom ===
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.enablePan = false;
        controls.minDistance = 1.8;
        controls.maxDistance = 6;

        // Giro contínuo (Regra Zero): pausa quando o usuário arrasta, retoma após inatividade
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;
        let resumeTimer = null;
        controls.addEventListener('start', () => {
            controls.autoRotate = false;
            clearTimeout(resumeTimer);
        });
        controls.addEventListener('end', () => {
            resumeTimer = setTimeout(() => { controls.autoRotate = true; }, 2500);
        });

        // === Loop de render, pausado quando o slide sai de tela ===
        let rafId = null;
        function animate() {
            rafId = requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        const visObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && rafId === null) {
                    animate();
                } else if (!entry.isIntersecting && rafId !== null) {
                    cancelAnimationFrame(rafId);
                    rafId = null;
                }
            });
        }, { threshold: 0.1 });
        visObserver.observe(wrap);

        // === Resize ===
        new ResizeObserver(() => {
            const w = wrap.clientWidth, h = wrap.clientHeight;
            if (w === 0 || h === 0) return;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }).observe(wrap);
    </script>
</body>

</html>
