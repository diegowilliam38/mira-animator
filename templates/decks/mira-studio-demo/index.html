<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MIRA · Multi Formato (demo)</title>
    <!-- ================================================================
         DECK MULTI FORMATO · coluna 9:16 pronta para o OBS Studio
         Gravação: sirva em localhost (node lib/mira-serve.js decks/mira-multi-formato-demo),
         abra no Chrome em tela cheia (F11), conceda a câmera, e no OBS use
         "Captura de Janela" recortando (Alt+arrastar) a coluna central.
         Grave em 1080x1920. A câmera já está composta: sem chroma key.
         Sem câmera (file:// ou permissão negada) as áreas ficam verde
         #00FF00: aplique o filtro Chroma Key do OBS como plano B.
         Teclas: setas navegam · C espelha a câmera · E edita · P pinta.
         ================================================================ -->
    <style>
        :root {
            --fmt-w: calc(100vh * 9 / 16);   /* coluna 9:16 cravada (saída OBS 1080x1920) */
            --fmt-h: 100vh;
            --accent: #FF904D;
            --bg: #0d0d0f;
            --ink: #f4f4f5;
            --muted: rgba(244, 244, 245, .58);
            --line: rgba(255, 255, 255, .12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: #333333; scroll-behavior: smooth; scroll-snap-type: y proximity; }
        body {
            background: #333333;
            color: var(--ink);
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;              /* centraliza a coluna (não margin:auto) */
            flex-direction: column;
            align-items: center;
        }
        /* cada <section> é um slide: coluna 9:16 central, laterais em #333333 */
        body > section {
            position: relative;
            width: var(--fmt-w);
            height: var(--fmt-h);
            min-height: var(--fmt-h);
            overflow: hidden;
            background: var(--bg);
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
        }

        /* DIRETIVA MIRA: título da capa nunca quebra com artigo/preposição solto */
        body > section:first-of-type h1,
        body > section:first-of-type h2 { text-wrap: balance; }

        h1 { font-size: clamp(34px, 7.4vh, 72px); line-height: 1.02; letter-spacing: -.02em; font-weight: 800; }
        h2 { font-size: clamp(28px, 4.6vh, 46px); line-height: 1.1; letter-spacing: -.01em; font-weight: 800; }
        p  { font-size: clamp(15px, 2vh, 20px); line-height: 1.5; color: var(--muted); }
        .accent { color: var(--accent); }

        /* ---------- capa ---------- */
        section.capa { justify-content: center; gap: 20px; padding: 7% 9%; }
        .eyebrow {
            display: inline-flex; align-items: center; gap: 9px; width: fit-content;
            font-size: 13px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase;
            color: var(--accent); padding: 8px 14px;
            border: 1px solid rgba(255, 144, 77, .4); border-radius: 999px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
        .capa::before {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(60% 42% at 50% 12%, rgba(255, 144, 77, .22), transparent 70%);
            animation: capaGlow 5s ease-in-out infinite;
        }
        @keyframes capaGlow { 0%, 100% { opacity: .55; } 50% { opacity: 1; } }
        .formatos { display: flex; gap: 10px; margin-top: 8px; }
        .formato {
            flex: 1; border: 1px solid var(--line); border-radius: 12px; padding: 12px 10px;
            font-size: 13px; font-weight: 700; text-align: center; color: var(--muted);
        }
        .formato b { display: block; color: var(--accent); font-size: 20px; margin-bottom: 4px; }

        /* ---------- layout camera: webcam na coluna inteira (mockup 16.jpg) ---------- */
        section[data-layout="camera"] .cam-area { flex: 1 1 auto; min-height: 0; }

        /* ---------- layout split: quadrado 1:1 no topo + câmera embaixo (mockup 15.jpg) ---------- */
        /* área segura do quadrado: 50/1080 do lado = 4.63% (padrão mira-squared, proporcional) */
        section[data-layout="split"] .split-top {
            width: 100%;
            aspect-ratio: 1 / 1;
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            padding: 4.63%;
            border-bottom: 1px solid var(--line);
        }
        section[data-layout="split"] .split-top h2 { flex: 0 0 auto; margin-bottom: 10px; text-align: center; }
        section[data-layout="split"] .cam-area { flex: 1 1 auto; min-height: 0; }

        /* ---------- layout full: animação vertical na coluna inteira (mockup 17.jpg) ---------- */
        section[data-layout="full"] .full-wrap {
            flex: 1 1 auto; min-height: 0;
            display: flex; flex-direction: column;
            padding: 4.63% 4.63% 3%;
        }
        section[data-layout="full"] h2 { flex: 0 0 auto; margin-bottom: 10px; text-align: center; }

        /* palco de animação: preenche todo o resto (viewBox casado em runtime) */
        .anim-stage { flex: 1 1 auto; min-height: 0; width: 100%; }
        .anim-stage svg { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <!-- === CAPA (sem data-layout: layout próprio) === -->
    <section class="capa">
        <span class="eyebrow"><span class="dot"></span>MIRA · Multi Formato</span>
        <h1>Um roteiro, <span class="accent">três formatos</span></h1>
        <p>Deck vertical 9:16 pronto para o OBS: sua câmera ao vivo, animação quadrada meio a meio, ou metáfora em tela cheia. Slide a slide, você escolhe.</p>
        <div class="formatos">
            <div class="formato"><b>1</b>só câmera</div>
            <div class="formato"><b>2</b>meio a meio</div>
            <div class="formato"><b>3</b>só animação</div>
        </div>
    </section>

    <!-- === SLIDE 1 · LAYOUT CAMERA (você em tela cheia) === -->
    <section data-layout="camera">
        <div class="cam-area"></div>
    </section>

    <!-- === SLIDE 2 · LAYOUT SPLIT (metáfora 1:1 em cima + você embaixo) === -->
    <section data-layout="split">
        <div class="split-top">
            <h2>Três formatos, <span class="accent">um roteiro</span></h2>
            <div class="anim-stage"><svg id="sv-orbita" preserveAspectRatio="xMidYMid meet"></svg></div>
        </div>
        <div class="cam-area"></div>
    </section>

    <!-- === SLIDE 3 · LAYOUT FULL (metáfora vertical em tela cheia) === -->
    <section data-layout="full">
        <div class="full-wrap">
            <h2>Do roteiro <span class="accent">ao vídeo</span></h2>
            <div class="anim-stage"><svg id="sv-fluxo" preserveAspectRatio="xMidYMid meet"></svg></div>
        </div>
    </section>

    <script src="assets/vendor/d3.v7.min.js"></script>
    <script>
        /* ============================================================
           SLIDE 2 · Orbital (quadrado 1:1, padrão mira-squared):
           o núcleo é o roteiro; os três formatos orbitam em volta dele.
           Loop interno infinito (Regra Zero) + casarPalco + fitToArea.
           ============================================================ */
        (function () {
            var svg = d3.select('#sv-orbita');
            if (svg.empty()) return;
            var stage = svg.node().closest('.anim-stage');
            var F = { W: 960, H: 960 };
            var EDGE = 14;
            var gen = window.__orbitaGen = (window.__orbitaGen || 0) + 1;

            function casarPalco() {
                var r = stage.getBoundingClientRect();
                if (r.width > 0 && r.height > 0) F.H = Math.round(F.W * r.height / r.width);
                svg.attr('viewBox', '0 0 ' + F.W + ' ' + F.H);
            }
            function fitToArea(g) {
                g.attr('transform', null);
                var b = g.node().getBBox();
                if (!b.width || !b.height) return;
                var tw = F.W - 2 * EDGE, th = F.H - 2 * EDGE;
                var s = Math.min(tw / b.width, th / b.height);
                var tx = EDGE + (tw - b.width * s) / 2 - b.x * s;
                var ty = EDGE + (th - b.height * s) / 2 - b.y * s;
                g.attr('transform', 'translate(' + tx + ',' + ty + ') scale(' + s + ')');
            }

            var SATS = [
                { linhas: ['SÓ', 'CÂMERA'], phase: 0 },
                { linhas: ['MEIO A', 'MEIO'], phase: 2 * Math.PI / 3 },
                { linhas: ['SÓ', 'ANIMAÇÃO'], phase: 4 * Math.PI / 3 }
            ];

            function build() {
                casarPalco();
                svg.selectAll('*').remove();
                var root = svg.append('g');
                var cx = F.W / 2, cy = F.H / 2;
                var R = Math.min(F.W, F.H) * 0.36;

                root.append('ellipse')
                    .attr('cx', cx).attr('cy', cy)
                    .attr('rx', R).attr('ry', R * 0.94)
                    .attr('fill', 'none')
                    .attr('stroke', 'rgba(255,144,77,.35)')
                    .attr('stroke-width', 2)
                    .attr('stroke-dasharray', '6 10');

                var spokes = root.append('g');
                var halo = root.append('circle')
                    .attr('cx', cx).attr('cy', cy).attr('r', 120)
                    .attr('fill', 'rgba(255,144,77,.22)');
                var core = root.append('g').attr('transform', 'translate(' + cx + ',' + cy + ')');
                core.append('circle').attr('r', 92).attr('fill', '#FF904D');
                core.append('text').text('UM')
                    .attr('text-anchor', 'middle').attr('y', -12)
                    .attr('font-family', 'Inter, sans-serif').attr('font-size', 30)
                    .attr('font-weight', 800).attr('fill', '#0d0d0f');
                core.append('text').text('ROTEIRO')
                    .attr('text-anchor', 'middle').attr('y', 26)
                    .attr('font-family', 'Inter, sans-serif').attr('font-size', 30)
                    .attr('font-weight', 800).attr('fill', '#0d0d0f');

                var sats = SATS.map(function (d) {
                    var g = root.append('g');
                    g.append('circle').attr('r', 72)
                        .attr('fill', '#17171a')
                        .attr('stroke', '#FF904D').attr('stroke-width', 3);
                    d.linhas.forEach(function (ln, i) {
                        g.append('text').text(ln)
                            .attr('text-anchor', 'middle')
                            .attr('y', d.linhas.length === 2 ? (i === 0 ? -6 : 24) : 8)
                            .attr('font-family', 'Inter, sans-serif').attr('font-size', 24)
                            .attr('font-weight', 700).attr('fill', '#f4f4f5');
                    });
                    return { g: g, phase: d.phase };
                });

                var line = spokes.selectAll('line').data(sats).enter().append('line')
                    .attr('stroke', 'rgba(255,255,255,.18)').attr('stroke-width', 2);

                var t = d3.timer(function (ms) {
                    if (window.__orbitaGen !== gen) { t.stop(); return; }
                    var ang = ms / 1000 * 0.5;                       /* volta a cada ~12,6s, loop infinito */
                    sats.forEach(function (s) {
                        s.x = cx + Math.cos(ang + s.phase) * R;
                        s.y = cy + Math.sin(ang + s.phase) * R * 0.94;
                        s.g.attr('transform', 'translate(' + s.x + ',' + s.y + ')');
                    });
                    line.attr('x1', cx).attr('y1', cy)
                        .attr('x2', function (d) { return d.x; })
                        .attr('y2', function (d) { return d.y; });
                    halo.attr('r', 120 + 14 * Math.sin(ms / 450));
                    fitToArea(root);
                });
            }

            build();
            window.addEventListener('resize', function () { casarPalco(); });
            if (document.fonts && document.fonts.ready) document.fonts.ready.then(function () { casarPalco(); });
        })();

        /* ============================================================
           SLIDE 3 · Fluxo vertical (padrão mira-vertical): a produção
           desce como uma linha de montagem, do roteiro ao vídeo pronto.
           Partícula desce nó a nó, com pulso na chegada. Loop infinito.
           ============================================================ */
        (function () {
            var svg = d3.select('#sv-fluxo');
            if (svg.empty()) return;
            var stage = svg.node().closest('.anim-stage');
            var F = { W: 960, H: 1523 };
            var EDGE = 14;
            var gen = window.__fluxoGen = (window.__fluxoGen || 0) + 1;

            function casarPalco() {
                var r = stage.getBoundingClientRect();
                if (r.width > 0 && r.height > 0) F.H = Math.round(F.W * r.height / r.width);
                svg.attr('viewBox', '0 0 ' + F.W + ' ' + F.H);
            }
            function fitToArea(g) {
                g.attr('transform', null);
                var b = g.node().getBBox();
                if (!b.width || !b.height) return;
                var tw = F.W - 2 * EDGE, th = F.H - 2 * EDGE;
                var s = Math.min(tw / b.width, th / b.height);
                var tx = EDGE + (tw - b.width * s) / 2 - b.x * s;
                var ty = EDGE + (th - b.height * s) / 2 - b.y * s;
                g.attr('transform', 'translate(' + tx + ',' + ty + ') scale(' + s + ')');
            }

            var ETAPAS = ['ROTEIRO', 'SLIDES 9:16', 'CÂMERA AO VIVO', 'OBS STUDIO', 'VÍDEO PRONTO'];
            var TRAVEL = 1100, PAUSE = 450;                            /* ms por trecho e por parada */
            var CICLO = (ETAPAS.length - 1) * (TRAVEL + PAUSE) + 1400; /* + respiro antes de recomeçar */

            function build() {
                casarPalco();
                svg.selectAll('*').remove();
                var root = svg.append('g');
                var cx = F.W * 0.34;                                   /* haste à esquerda, rótulos à direita */
                var ys = d3.scalePoint().domain(d3.range(ETAPAS.length)).range([F.H * 0.06, F.H * 0.94]);

                root.append('line')
                    .attr('x1', cx).attr('y1', ys(0)).attr('x2', cx).attr('y2', ys(ETAPAS.length - 1))
                    .attr('stroke', 'rgba(255,255,255,.18)').attr('stroke-width', 3);

                var pulseLayer = root.append('g');
                var nos = ETAPAS.map(function (label, i) {
                    var g = root.append('g').attr('transform', 'translate(' + cx + ',' + ys(i) + ')');
                    var c = g.append('circle').attr('r', 52)
                        .attr('fill', '#17171a')
                        .attr('stroke', 'rgba(255,144,77,.55)').attr('stroke-width', 4);
                    g.append('text').text(i + 1)
                        .attr('text-anchor', 'middle').attr('y', 14)
                        .attr('font-family', 'Inter, sans-serif').attr('font-size', 40)
                        .attr('font-weight', 800).attr('fill', '#FF904D');
                    g.append('text').text(label)
                        .attr('x', 84).attr('y', 15).attr('text-anchor', 'start')
                        .attr('font-family', 'Inter, sans-serif').attr('font-size', 46)
                        .attr('font-weight', 800).attr('fill', '#f4f4f5');
                    return { circle: c, y: ys(i), lit: false };
                });

                var orbeHalo = root.append('circle').attr('r', 34).attr('fill', 'rgba(255,144,77,.3)');
                var orbe = root.append('circle').attr('r', 18).attr('fill', '#FF904D');

                function pulse(y) {
                    pulseLayer.append('circle')
                        .attr('cx', cx).attr('cy', y).attr('r', 52)
                        .attr('fill', 'none').attr('stroke', '#FF904D').attr('stroke-width', 5)
                        .attr('opacity', .85)
                        .transition().duration(650).ease(d3.easeCubicOut)
                        .attr('r', 120).attr('opacity', 0)
                        .remove();
                }

                var t = d3.timer(function (ms) {
                    if (window.__fluxoGen !== gen) { t.stop(); return; }
                    var m = ms % CICLO;
                    var seg = Math.min(Math.floor(m / (TRAVEL + PAUSE)), ETAPAS.length - 2);
                    var inSeg = m - seg * (TRAVEL + PAUSE);
                    var y;
                    if (m >= (ETAPAS.length - 1) * (TRAVEL + PAUSE)) {
                        y = nos[ETAPAS.length - 1].y;                  /* respiro no último nó */
                    } else if (inSeg < TRAVEL) {
                        var p = d3.easeCubicInOut(inSeg / TRAVEL);
                        y = nos[seg].y + (nos[seg + 1].y - nos[seg].y) * p;
                        nos[seg + 1].lit = false;
                    } else {
                        y = nos[seg + 1].y;
                        if (!nos[seg + 1].lit) {                       /* chegada: pulso + acende */
                            nos[seg + 1].lit = true;
                            pulse(nos[seg + 1].y);
                            nos[seg + 1].circle.attr('stroke', '#FF904D').attr('fill', '#241a12');
                        }
                    }
                    if (m < 60) nos.forEach(function (n, i) {          /* reinício do ciclo: apaga */
                        if (i > 0) { n.lit = false; n.circle.attr('stroke', 'rgba(255,144,77,.55)').attr('fill', '#17171a'); }
                    });
                    orbe.attr('cx', cx).attr('cy', y);
                    orbeHalo.attr('cx', cx).attr('cy', y).attr('r', 34 + 6 * Math.sin(ms / 300));
                    fitToArea(root);
                });
            }

            build();
            window.addEventListener('resize', function () { casarPalco(); });
            if (document.fonts && document.fonts.ready) document.fonts.ready.then(function () { casarPalco(); });
        })();

        /* ============================================================
           Auto-ajuste de título: máximo 2 linhas (padrão das skills)
           ============================================================ */
        (function () {
            var MAX_LINES = 2, MIN_FONT = 18;
            function fitTitles() {
                document.querySelectorAll('body > section h2').forEach(function (h2) {
                    h2.style.removeProperty('font-size');
                    var font = parseFloat(getComputedStyle(h2).fontSize), guard = 0;
                    while (h2.scrollHeight > parseFloat(getComputedStyle(h2).lineHeight) * MAX_LINES + 2 && font > MIN_FONT && guard < 90) {
                        font -= 1; h2.style.setProperty('font-size', font + 'px', 'important'); guard++;
                    }
                });
            }
            window.addEventListener('load', fitTitles);
            if (document.fonts && document.fonts.ready) document.fonts.ready.then(fitTitles);
            window.addEventListener('resize', function () { clearTimeout(window.__fitT); window.__fitT = setTimeout(fitTitles, 150); });
        })();

        /* ============================================================
           Navegação por teclado do deck (quieta durante E, P ou digitação)
           ============================================================ */
        (function () {
            var secs = Array.prototype.slice.call(document.querySelectorAll('body > section'));
            function current() {
                var best = 0;
                for (var i = 0; i < secs.length; i++) if (secs[i].offsetTop <= window.scrollY + 4) best = i;
                return best;
            }
            function go(d) {
                var i = Math.max(0, Math.min(secs.length - 1, current() + d));
                secs[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            document.addEventListener('keydown', function (e) {
                if (document.body.classList.contains('me-on') || document.body.classList.contains('md-on')) return;
                var t = e.target;
                if (t && (t.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName || ''))) return;
                if (e.ctrlKey || e.metaKey || e.altKey) return;
                if (['ArrowDown', 'ArrowRight', 'PageDown', ' ', 'Spacebar'].indexOf(e.key) !== -1) { e.preventDefault(); go(1); }
                else if (['ArrowUp', 'ArrowLeft', 'PageUp'].indexOf(e.key) !== -1) { e.preventDefault(); go(-1); }
            });
        })();
    </script>
