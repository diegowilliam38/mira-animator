<!-- CARD CAPA: [TITULO_APRESENTACAO] — abertura com partículas orbitando em loop -->
<section class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden px-6">
    <div id="capa-stage" class="absolute inset-0 pointer-events-none"></div>

    <div class="relative z-10 text-center max-w-4xl" data-aos="fade-up">
        <p class="attribute-pill inline-block px-5 py-2 text-sm tracking-widest uppercase text-soft mb-8">[BADGE_CONTEXTO]</p>
        <h1 class="text-6xl md:text-7xl font-black leading-tight mb-6">
            [TITULO_LINHA_1]<br>
            <span class="primary-color">[TITULO_DESTAQUE]</span>
        </h1>
        <p class="text-xl text-soft max-w-2xl mx-auto mb-10">[SUBTITULO_PROMESSA]</p>
        <div class="flex items-center justify-center gap-3 text-softer text-sm">
            <i data-lucide="user" class="w-4 h-4 primary-color"></i> [AUTOR]
            <span class="opacity-40">|</span>
            <i data-lucide="calendar" class="w-4 h-4 primary-color"></i> [DATA]
        </div>
    </div>

    <script>
        // LOOP INTERNO: partículas orbitando o centro da capa, perpétuo
        (function () {
            const stage = d3.select('#capa-stage');
            const W = window.innerWidth, H = window.innerHeight;
            const svg = stage.append('svg').attr('viewBox', `0 0 ${W} ${H}`);
            const cx = W / 2, cy = H / 2;
            const primary = getComputedStyle(document.documentElement).getPropertyValue('--mira-primary').trim();

            const particles = d3.range(24).map(i => ({
                r: 180 + Math.random() * Math.min(W, H) * 0.35,
                angle: Math.random() * Math.PI * 2,
                speed: 0.002 + Math.random() * 0.004,
                size: 1.5 + Math.random() * 3
            }));

            const dots = svg.selectAll('circle').data(particles).join('circle')
                .attr('r', d => d.size)
                .attr('fill', primary)
                .attr('opacity', 0.35);

            d3.timer(() => {
                dots.attr('cx', d => { d.angle += d.speed; return cx + Math.cos(d.angle) * d.r; })
                    .attr('cy', d => cy + Math.sin(d.angle) * d.r * 0.6);
            });
        })();
    </script>
</section>
